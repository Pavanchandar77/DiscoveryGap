# Redrob Hackathon — Submission Metadata Template
#
# Copy this file to your repo root as `submission_metadata.yaml` and fill it in.
# The fields here should match what you submit via the portal at upload time.
# Stage 3 review uses this file to verify your portal metadata.

# ============================================================================
# Team identity
# ============================================================================
team_name: "your-team-name-here"  # Used in leaderboard and announcements

primary_contact:
  name: "Full Name"
  email: "primary@example.com"   # Used for all organizer communication
  phone: "+91-XXXXXXXXXX"        # Used for top-50 / top-10 outreach

team_members:
  - name: "Member 1 Full Name"
    email: "member1@example.com"
    role: "ML Engineer"          # Optional, e.g. "Team Lead", "Backend", "Data"
  - name: "Member 2 Full Name"
    email: "member2@example.com"
    role: "Data Engineer"
  # Add more members as needed; solo participants list just one member

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/pavanchandar77/discoverygap"   # submission of record: main (PR from claude/adoring-rubin-uwuet6)
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3 (the email to add will be communicated then).

sandbox_link: "https://discovery-gamma-lime.vercel.app/"
# Required. A working hosted environment where the ranker runs on a candidate sample.
# Our sandbox is the deployed Discovery web app: it serves the dashboard, GET /demo
# (precomputed), and POST /rank (upload a candidates .jsonl/.zip — a ready sample is
# linked on the landing page and at /sample_candidates.jsonl). One container also runs
# the whole thing via redrob-ranker/Dockerfile.web.

reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "MacBook Pro M2"                    # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.11.4"                      # python --version
  os: "macOS 14.2"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # rank.py monkeypatches sockets off (compliance guard)
  pre_computation_required: true                # we precompute embeddings offline (scripts/precompute.py)
  pre_computation_time_minutes: 3               # measured: full 100K, deterministic hashing backend, CPU

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Claude"        # Claude Code — pair-programming the pipeline, calibration, and review
  # Other options: "ChatGPT", "Cursor", "Gemini", "Codeium", "Other", "None"

ai_usage_summary: |
  Used Claude (Claude Code) as a pair programmer: building and reviewing the ranking
  pipeline, calibrating the honeypot detector and self-label logic against the real
  pool's distributions, and iterating on the gated scoring and reasoning generator.
  All design decisions and thresholds are human-reviewed and documented in config.py.
  Candidate data was processed only locally; no candidate records were sent to any
  hosted LLM. The scored ranking step (rank.py) makes no network or LLM calls.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  A transparent, gated four-bucket ensemble — Capability, Growth, Adaptability, and
  Authenticity & Availability — with no trained model (there are no labels). The edge
  is in the signals, not the algorithm. A weighted fit base is multiplied by a title
  gate and an authenticity multiplier: score = base * title_gate * authenticity, with
  a hard floor of 0 for honeypots and hard disqualifiers. The multiplicative title gate
  is the decisive anti-stuffer mechanism — a stuffed AI skill list on a Marketing-Manager
  title cannot reach the top. Honeypots are removed by pure-logic internal-consistency
  checks (skill/tenure/date impossibilities), calibrated against the real pool so the
  hard-kill gate is precision-first. Plain-language transfer (career text describing the
  building of ranking/search/recsys systems) is credited as first-class evidence, catching
  the JD's "hidden gem" who is a fit without the buzzwords. Behavioral signals apply a
  down-weighting availability multiplier, and a soft preference for the JD's stated
  experience band, location, and notice period. Semantic fit is one capability sub-signal,
  encoded offline into cached vectors; the default encoder is a deterministic, network-free
  lexical backend (reproducible by the judges with no model download), with BGE available as
  an optional upgrade. The ranking quality therefore rests on the structured trap-resistant
  signals, not on semantic similarity — by design (signals > models). The scored ranking step
  is CPU-only, network-free numpy arithmetic over cached vectors. Reasoning is feature-templated
  (no LLM), cites only real profile fields, and is keyed to rank.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # explicit pure-logic honeypot gate; 0 honeypots in top-100 (see eval/run_eval.py)
  reproduction_tested: true         # full 100K precompute + rank.py run end-to-end; official validator passes; 36.5s
